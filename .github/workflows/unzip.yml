name: Unzip and Remove ZIP

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip file
        run: |
          unzip -o moji-v1.26.6.9.zip -d .
          rm moji-v1.26.6.9.zip

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add .
          git commit -m "Extract zip and remove archive" || echo "No changes"
          git push
